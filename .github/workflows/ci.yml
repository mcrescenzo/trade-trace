name: CI

# Run quality gates on every PR + main push per bead trade-trace-go2 /
# DEBT-003. Before this workflow existed, ruff/mypy/pytest only ran
# inside the tag-gated PyPI publish workflow, so regressions could
# merge to main and only surface when someone cut a release.
#
# The publish workflow keeps its own internal test gate as a safety
# net before packaging; this workflow is the earlier signal. Both
# delegate to the shared `_test.yml` reusable workflow per bead
# trade-trace-x7mr so any matrix or gate change happens in one place.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_test.yml
