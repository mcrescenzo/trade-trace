name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    # Delegate to the shared reusable workflow per bead trade-trace-x7mr
    # so any matrix or gate change updates both CI and publish at once.
    uses: ./.github/workflows/_test.yml

  build:
    name: Build sdist and wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches package versions
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(python -c "import re, pathlib; m = re.search(r'__version__\s*=\s*[\x27\x22]([^\x27\x22]+)[\x27\x22]', pathlib.Path('src/trade_trace/version.py').read_text()); print(m.group(1))")
          echo "git tag (stripped) : $TAG"
          echo "version.py         : $MODULE_VERSION"
          if [ "$TAG" != "$MODULE_VERSION" ]; then
            echo "::error::Version mismatch — tag and src/trade_trace/version.py must match before publishing"
            exit 1
          fi

      - name: Install build + twine
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Verify distribution metadata (twine check)
        # Per trade-trace-qasx: fail the publish pipeline early if the
        # README or other PyPI-rendered metadata is malformed.
        run: python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/trade-trace
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
