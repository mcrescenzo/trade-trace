name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest

  build:
    name: Build sdist and wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches package versions
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          MODULE_VERSION=$(python -c "import re, pathlib; m = re.search(r'__version__\s*=\s*[\x27\x22]([^\x27\x22]+)[\x27\x22]', pathlib.Path('src/trade_trace/version.py').read_text()); print(m.group(1))")
          echo "git tag (stripped) : $TAG"
          echo "pyproject.toml     : $PYPROJECT_VERSION"
          echo "version.py         : $MODULE_VERSION"
          if [ "$TAG" != "$PYPROJECT_VERSION" ] || [ "$TAG" != "$MODULE_VERSION" ]; then
            echo "::error::Version mismatch — tag, pyproject.toml, and src/trade_trace/version.py must all match before publishing"
            exit 1
          fi

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/trade-trace
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
