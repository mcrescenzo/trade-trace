{% extends "base.html" %}
{% block title %}{{ error_title }} · Trade Trace Console{% endblock %}
{% block content %}
<section class="tt-error" data-error-reason="{{ reason }}">
  <div class="tt-page-heading">
    <p class="tt-eyebrow">Console error</p>
    <h1>{{ error_title }}</h1>
    <p class="tt-lede">{{ error_message }}</p>
  </div>
  <article class="tt-empty-state" data-empty-state="error">
    <h2>{{ reason }}</h2>
    <ol>
      {% for label, cmd in next_steps %}
        <li>{{ label }}: <code>{{ cmd }}</code></li>
      {% endfor %}
    </ol>
  </article>
</section>
{% endblock %}
